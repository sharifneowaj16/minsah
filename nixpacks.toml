[phases.setup]
# Node.js 22 LTS — Prisma requirement (^20.19 || ^22.12 || >=24.0)
# libvips — sharp (image processing) এর জন্য required
nixPkgs = ["nodejs_22", "npm-10_x", "vips", "pkg-config", "python3"]

[phases.install]
cmds = [
  "npm ci",
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
